pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins { id("com.facebook.react.settings") version "0.76.5" }

rootProject.name = 'MobileAgent'
include ':app'

// 配置 React Native 扩展
try {
    extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
        ex.autolinkLibrariesFromCommand()
    }
} catch (Exception e) {
    logger.warn("ReactSettingsExtension not available: ${e.message}")
}
