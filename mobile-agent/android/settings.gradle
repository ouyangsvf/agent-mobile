pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    // 从 node_modules 加载 React Native Gradle 插件
    // 尝试多个可能的路径
    def possiblePaths = [
        file('../node_modules/@react-native/gradle-plugin'),
        file('../../node_modules/@react-native/gradle-plugin'),
    ]
    
    def found = false
    possiblePaths.each { path ->
        if (path.exists() && !found) {
            println "Found gradle-plugin at: ${path.absolutePath}"
            includeBuild(path)
            found = true
        }
    }
    
    if (!found) {
        throw new GradleException("""
            ERROR: React Native gradle-plugin not found!
            Tried paths:
              - ${possiblePaths[0].absolutePath}
              - ${possiblePaths[1].absolutePath}
            Make sure 'npm install' was run successfully.
        """.stripIndent())
    }
}

plugins { id("com.facebook.react.settings") }

rootProject.name = 'MobileAgent'
include ':app'

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand()
}
