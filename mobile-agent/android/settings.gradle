pluginManagement {
    repositories {
        mavenLocal()  // 首先查找本地 maven
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

// 从 mavenLocal 加载插件（需要先 publishToMavenLocal）
plugins { id("com.facebook.react.settings") version "0.76.5" }

rootProject.name = 'MobileAgent'
include ':app'

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand()
}
