pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    // 加载 React Native Gradle 插件 - 从 node_modules
    def rnGradlePlugin = file('../node_modules/@react-native/gradle-plugin')
    if (rnGradlePlugin.exists()) {
        includeBuild(rnGradlePlugin)
    } else {
        throw new GradleException("React Native gradle-plugin not found at ${rnGradlePlugin.absolutePath}. Did you run npm install?")
    }
}

plugins { id("com.facebook.react.settings") }

rootProject.name = 'MobileAgent'
include ':app'

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand()
}
