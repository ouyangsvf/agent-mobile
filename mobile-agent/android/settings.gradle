pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    // 在 CI 环境中，尝试从 node_modules 加载 React Native gradle-plugin
    def reactNativePackageJson = new File(rootDir, '../node_modules/react-native/package.json')
    if (reactNativePackageJson.exists()) {
        def reactNativeRoot = reactNativePackageJson.parentFile
        def gradlePluginDir = new File(reactNativeRoot, 'gradle-plugin')
        if (gradlePluginDir.exists()) {
            includeBuild(gradlePluginDir)
        }
    }
}

// React Native 设置插件 - 用于 autolink
plugins { id("com.facebook.react.settings") }

rootProject.name = 'MobileAgent'
include ':app'

// 配置 React Native 扩展（如果插件加载成功）
try {
    extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
        ex.autolinkLibrariesFromCommand()
    }
} catch (Exception e) {
    logger.warn("ReactSettingsExtension not available: ${e.message}")
}
