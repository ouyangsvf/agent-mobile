name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-agent
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: mobile-agent/package-lock.json
        
    - name: Install dependencies
      run: |
        npm ci
        # 验证 node_modules 存在
        ls -la node_modules/react-native/gradle-plugin/ || echo "gradle-plugin not found!"
        
    - name: Make Gradle executable
      run: chmod +x android/gradlew
      
    - name: Build Release APK
      run: |
        cd android
        ./gradlew assembleRelease --no-daemon --console=plain
      env:
        CI: true
        
    - name: List APK files
      run: |
        find android/app/build/outputs -name "*.apk" -ls || echo "No APK found"
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-unsigned
        path: mobile-agent/android/app/build/outputs/apk/release/*.apk
