name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false  # 不拉取子模块
        
    - name: Remove MobileAgent if it's a submodule
      run: |
        # 如果 MobileAgent 是空的子模块，移除它
        if [ -d "mobile-agent/MobileAgent" ] && [ -z "$(ls -A mobile-agent/MobileAgent 2>/dev/null)" ]; then
          echo "Removing empty MobileAgent directory"
          rm -rf mobile-agent/MobileAgent
        fi
        
    - name: Debug - Check mobile-agent contents
      run: |
        echo "=== mobile-agent directory ==="
        ls -la mobile-agent/
        echo ""
        echo "=== Check for node_modules ==="
        ls mobile-agent/node_modules 2>/dev/null | head -5 || echo "No node_modules yet"
        
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: mobile-agent/package-lock.json
        
    - name: Install dependencies
      working-directory: mobile-agent
      run: |
        npm ci --legacy-peer-deps
        echo ""
        echo "=== Verify native_modules.gradle exists ==="
        ls -la node_modules/@react-native-community/cli-platform-android/native_modules.gradle
        
    - name: Make Gradle executable
      run: chmod +x mobile-agent/android/gradlew
      
    - name: Build Release APK
      working-directory: mobile-agent/android
      run: ./gradlew assembleRelease --no-daemon --console=plain
      env:
        CI: true
        
    - name: List APK files
      working-directory: mobile-agent
      run: find android -name "*.apk" -ls 2>/dev/null || echo "No APK found"
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-release
        path: mobile-agent/android/app/build/outputs/apk/release/*.apk
