name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Debug Project Structure
      run: |
        echo "=== Current Directory ==="
        pwd
        echo ""
        echo "=== Root Directory Contents ==="
        ls -la
        
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: mobile-agent/package-lock.json
        
    - name: Install dependencies
      working-directory: mobile-agent
      run: |
        npm ci --legacy-peer-deps
        
    - name: Build React Native Gradle Plugin
      working-directory: mobile-agent/node_modules/@react-native/gradle-plugin
      run: |
        echo "=== Building gradle-plugin ==="
        chmod +x gradlew
        ./gradlew build --no-daemon
        
    - name: Make Gradle executable
      run: chmod +x mobile-agent/android/gradlew
      
    - name: Build Release APK
      working-directory: mobile-agent/android
      run: |
        ./gradlew assembleRelease --no-daemon --console=plain
      env:
        CI: true
        
    - name: List APK files
      run: |
        find mobile-agent/android -name "*.apk" -ls 2>/dev/null || echo "No APK found"
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-release
        path: mobile-agent/android/app/build/outputs/apk/release/*.apk
