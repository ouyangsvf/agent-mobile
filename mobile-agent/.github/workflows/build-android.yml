name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false
        
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: mobile-agent/package-lock.json
        
    - name: Install dependencies
      working-directory: mobile-agent
      run: npm ci --legacy-peer-deps
        
    - name: Make Gradle executable
      run: chmod +x mobile-agent/android/gradlew
      
    - name: Clean Gradle build
      working-directory: mobile-agent/android
      run: ./gradlew clean --no-daemon
      
    - name: Build Release APK
      working-directory: mobile-agent/android
      run: ./gradlew assembleRelease --no-daemon --console=plain --refresh-dependencies
      env:
        CI: true
        
    - name: List APK files
      working-directory: mobile-agent
      run: find android -name "*.apk" -ls 2>/dev/null || echo "No APK found"
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-release
        path: mobile-agent/android/app/build/outputs/apk/release/*.apk
