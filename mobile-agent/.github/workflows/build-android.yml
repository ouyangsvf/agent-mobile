name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Debug - Show directory structure
      run: |
        echo "=== Current Directory ==="
        pwd
        echo ""
        echo "=== List all files in root ==="
        ls -la
        echo ""
        echo "=== Find node_modules ==="
        find . -maxdepth 3 -name "node_modules" -type d 2>/dev/null
        echo ""
        echo "=== Check if mobile-agent exists ==="
        ls -la mobile-agent/ 2>/dev/null || echo "mobile-agent not found"
        
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: mobile-agent/package-lock.json
        
    - name: Install dependencies
      run: |
        cd mobile-agent
        npm ci --legacy-peer-deps
        
    - name: Debug - Check paths after npm install
      run: |
        echo "=== Check from repo root ==="
        ls mobile-agent/node_modules/@react-native/gradle-plugin/ 2>/dev/null && echo "Found at mobile-agent/node_modules" || echo "Not at mobile-agent/node_modules"
        echo ""
        echo "=== Check from android dir perspective ==="
        ls mobile-agent/android/../node_modules/@react-native/gradle-plugin/ 2>/dev/null && echo "Found at ../node_modules" || echo "Not at ../node_modules"
        
    - name: Make Gradle executable
      run: chmod +x mobile-agent/android/gradlew
      
    - name: Build Release APK
      run: |
        cd mobile-agent/android
        ./gradlew assembleRelease --no-daemon --console=plain --stacktrace 2>&1 | head -100
      env:
        CI: true
        
    - name: List APK files
      run: |
        find mobile-agent/android -name "*.apk" -ls 2>/dev/null || echo "No APK found"
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-release
        path: mobile-agent/android/app/build/outputs/apk/release/*.apk
