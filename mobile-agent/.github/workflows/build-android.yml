name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-agent
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: mobile-agent/package-lock.json
        
    - name: Install dependencies
      run: |
        npm ci --legacy-peer-deps
        echo ""
        echo "=== Verifying node_modules ==="
        ls -la node_modules/@react-native/gradle-plugin/ || echo "NOT FOUND!"
        
    - name: Make Gradle executable
      run: chmod +x android/gradlew
      
    - name: Verify paths
      run: |
        echo "Current directory: $(pwd)"
        echo "Listing contents:"
        ls -la
        echo ""
        echo "Checking android directory:"
        ls -la android/
        echo ""
        echo "Verifying gradle-plugin path from android directory:"
        ls -la android/../node_modules/@react-native/gradle-plugin/ || echo "Path check failed!"
        
    - name: Build Release APK
      run: |
        cd android
        ./gradlew assembleRelease --no-daemon --console=plain
      env:
        CI: true
        
    - name: List APK files
      run: |
        find android -name "*.apk" -ls 2>/dev/null || echo "No APK found"
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-release
        path: mobile-agent/android/app/build/outputs/apk/release/*.apk
